receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

  # Scrapea las métricas de redis-exporter y las mete en el pipeline
  prometheus:
    config:
      scrape_configs:
        - job_name: 'redis-nakel'
          scrape_interval: 30s
          static_configs:
            - targets: ['redis-exporter:9121']
              labels:
                service: 'redis'
                cliente: 'nakel'

processors:
  batch:
    timeout: 10s
    send_batch_size: 1024

  # Defaults de infraestructura — insert no pisa lo que ya viene del SDK
  resource:
    attributes:
      - key: host.name
        value: "lxc-110"
        action: insert
      - key: deployment.environment
        value: "production"
        action: insert

exporters:
  # Push hacia Prometheus en Neelix — remote_write via NodePort 32090
  prometheusremotewrite:
    endpoint: "http://192.168.25.55:32090/api/v1/write"
    resource_to_telemetry_conversion:
      enabled: true
    tls:
      insecure: true

  # Forward traces a Tempo en Neelix via NodePort
  otlp/tempo:
    endpoint: "192.168.25.55:32416"
    tls:
      insecure: true

  # Debug — ver spans en los logs del collector (apagar en prod si hay volumen)
  debug:
    verbosity: basic

extensions:
  health_check:
    endpoint: 0.0.0.0:13133
  pprof:
    endpoint: 0.0.0.0:1777

service:
  extensions: [health_check, pprof]

  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch, resource]
      exporters: [otlp/tempo, debug]

    metrics:
      receivers: [otlp, prometheus]
      processors: [batch, resource]
      exporters: [prometheusremotewrite]

    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug]
